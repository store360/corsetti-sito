<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "blue": "#1a7ec8",
  "darkBg": "#0e1c2f"
}/*EDITMODE-END*/;

const PRODUCT_IMG = 'https://www.farmaciacorsetti.it/immagine.php?src=seaweed-scrub.png&w=396&h=396';

// ── RESPONSIVE HOOK ──────────────────────────────────────────────────────────
function useResponsive() {
  const [width, setWidth] = useState(typeof window !== 'undefined' ? window.innerWidth : 1200);
  useEffect(() => {
    const fn = () => setWidth(window.innerWidth);
    window.addEventListener('resize', fn);
    return () => window.removeEventListener('resize', fn);
  }, []);
  return { isMobile: width < 600, isTablet: width < 900, width };
}

const LUXURY_PRODUCTS = [
  { cat: 'CORPO', name: 'Water Breeze Shower Gel', desc: 'Gel doccia rinfrescante con profumo delicato', img: PRODUCT_IMG },
  { cat: 'VISO', name: 'Rose Global Age', desc: 'Crema globale anti-age con rosa canina, acido ialuronico e vitamina B12', img: PRODUCT_IMG },
  { cat: 'VISO E CORPO', name: 'Seaweed Scrub', desc: 'Scrub rigenerante alle alghe marine, delicato e nutritivo', img: PRODUCT_IMG },
  { cat: 'CAPELLI', name: 'Sublime Hair Shampoo', desc: 'Shampoo nutriente per capelli morbidi e luminosi', img: PRODUCT_IMG },
  { cat: 'VISO', name: 'Hydra Boost Serum', desc: 'Siero idratante con acido ialuronico a tre pesi molecolari', img: PRODUCT_IMG },
  { cat: 'CORPO', name: 'Velvet Body Cream', desc: 'Crema corpo setosa con burro di karité e vitamina E', img: PRODUCT_IMG },
];

const NAV_PAGES = ['home', 'telemedicina', 'prodotti', 'laboratorio', 'eventi', 'test', 'contatti'];
const NAV_LABELS = { home: 'Home', telemedicina: 'Esami e diagnostica', prodotti: 'Corsetti Luxury', laboratorio: 'Laboratorio', eventi: 'Eventi', test: 'Test', contatti: 'Contatti' };

// ── MENU DINAMICO DA menu.json ───────────────────────────────────────────────
function useMenu() {
  const [voci, setVoci] = React.useState(
    NAV_PAGES.map(p => ({ id: p, label: NAV_LABELS[p], attiva: true }))
  );
  React.useEffect(() => {
    fetch('/menu.json')
      .then(r => r.json())
      .then(data => {
        const attive = data.filter(v => v.attiva).map(v => ({
          id: v.id,
          label: v.label,
          attiva: true
        }));
        if (attive.length > 0) setVoci(attive);
      })
      .catch(() => {});
  }, []);
  return voci;
}


// ── HEADER ──────────────────────────────────────────────────────────────────
function Header({ page, setPage, blue, menuVoci = [] }) {
  const [scrolled, setScrolled] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const { isMobile } = useResponsive();

  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 8);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);

const navigate = (p) => {
    if (p === 'eventi') { window.location.href = '/eventi.php'; return; }
    if (p === 'test') { window.location.href = '/test'; return; }
    setPage(p); setMenuOpen(false); window.scrollTo(0,0);
};

  return (
    <header style={{
      position: 'sticky', top: 0, zIndex: 200, background: '#fff',
      borderBottom: scrolled ? '1px solid #e8eff7' : '1px solid #f0f5fb',
      boxShadow: scrolled ? '0 2px 16px rgba(26,126,200,0.08)' : 'none',
      transition: 'all 0.3s',
    }}>
      <div style={{ maxWidth: 1180, margin: '0 auto', padding: '0 20px', display: 'flex', alignItems: 'center', height: 62, gap: 12 }}>
        <button onClick={() => navigate('home')} style={{ background: 'none', border: 'none', cursor: 'pointer', flexShrink: 0, display: 'flex', alignItems: 'center' }}>
          <img src="corsetti-logo.png" alt="Farmacia Corsetti"
            style={{ height: 46, objectFit: 'contain' }}
            onError={e => { e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }}
          />
          <span style={{ display:'none', alignItems:'center', gap:6 }}>
            <svg width="20" height="20" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="10" stroke={blue} strokeWidth="2"/><path d="M7 11h8M11 7v8" stroke={blue} strokeWidth="2" strokeLinecap="round"/></svg>
            <span style={{ fontSize:14, color:'#1a2332' }}>Farmacia Corsetti</span>
          </span>
        </button>

        {!isMobile && (
          <nav style={{ flex: 1, display: 'flex', gap: 2 }}>
            {menuVoci.map(v => (
              <button key={v.id} onClick={() => navigate(v.id)} style={{
                background: page===v.id ? `${blue}12` : 'transparent', border:'none', cursor:'pointer',
                padding:'6px 13px', borderRadius:7, fontSize:13.5,
                color: page===v.id ? blue : '#4a5f75', fontFamily:'Noto Sans Display', transition:'all 0.18s',
              }}
                onMouseEnter={e => { if(page!==v.id) e.currentTarget.style.background='#f3f7fc'; }}
                onMouseLeave={e => { if(page!==v.id) e.currentTarget.style.background='transparent'; }}
              >{v.label}</button>
            ))}
          </nav>
        )}

        <div style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:10 }}>
          {!isMobile && (
            <button onClick={() => navigate('contatti')} style={{
              background:blue, color:'#fff', border:'none', cursor:'pointer',
              padding:'8px 22px', borderRadius:8, fontSize:13.5,
              fontFamily:'Noto Sans Display', boxShadow:`0 2px 10px ${blue}44`, transition:'opacity 0.2s',
            }}
              onMouseEnter={e => e.currentTarget.style.opacity='0.88'}
              onMouseLeave={e => e.currentTarget.style.opacity='1'}
            >Chiedi al farmacista</button>
          )}
          {isMobile && (
            <button onClick={() => setMenuOpen(o => !o)} style={{
              background:'none', border:'none', cursor:'pointer', padding:8,
              display:'flex', flexDirection:'column', gap:5,
            }}>
              {[0,1,2].map(i => (
                <span key={i} style={{
                  display:'block', width:22, height:1.5, background:'#1a2332', borderRadius:1, transition:'all 0.25s',
                  transform: menuOpen ? (i===0?'rotate(45deg) translate(4px,4px)':i===2?'rotate(-45deg) translate(4px,-4px)':'scaleX(0)') : 'none',
                  opacity: (menuOpen && i===1) ? 0 : 1,
                }} />
              ))}
            </button>
          )}
        </div>
      </div>

      {isMobile && menuOpen && (
        <div style={{ background:'#fff', borderTop:'1px solid #edf2f7', padding:'12px 20px 20px', display:'flex', flexDirection:'column', gap:4, boxShadow:'0 8px 24px rgba(0,0,0,0.08)' }}>
          {menuVoci.map(v => (
            <button key={v.id} onClick={() => navigate(v.id)} style={{
              background: page===v.id ? `${blue}10` : 'none', border:'none', cursor:'pointer',
              padding:'12px 14px', borderRadius:9, fontSize:15, textAlign:'left',
              color: page===v.id ? blue : '#1a2332', fontFamily:'Noto Sans Display',
            }}>{v.label}</button>
          ))}
          <button onClick={() => navigate('contatti')} style={{
            background:blue, color:'#fff', border:'none', cursor:'pointer',
            padding:'12px', borderRadius:9, fontSize:14, marginTop:8, fontFamily:'Noto Sans Display',
          }}>Prenota ora</button>
        </div>
      )}
    </header>
  );
}

            <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
              <path d="M7 12.5S1.5 9 1.5 5a3.5 3.5 0 0 1 7 0 3.5 3.5 0 0 1 3.5-3.5" stroke={blue} strokeWidth="1.4" strokeLinecap="round"/>
              <path d="M7 12.5S12.5 9 12.5 5a5.5 5.5 0 0 0-11 0c0 4 5.5 7.5 5.5 7.5z" stroke={blue} strokeWidth="1.2" fill="none"/>
            </svg>
            <span style={{ fontSize: 12.5, color: blue, fontWeight: 400 }}>La tua salute, la nostra missione</span>

          <h1 style={{ fontSize: 'clamp(40px, 5vw, 58px)', fontWeight: 400, lineHeight: 1.08, letterSpacing: '-0.035em', color: '#0f1e2d', marginBottom: 4 }}>

            </button>
            <button onClick={() => setPage('contatti')} style={{
              background: '#fff', color: '#1a2332',

              fontFamily: 'Noto Sans Display', transition: 'border-color 0.2s, box-shadow 0.2s',
              boxShadow: '0 2px 8px rgba(0,0,0,0.06)',
            }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = blue; e.currentTarget.style.boxShadow = `0 4px 16px ${blue}22`; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = 'rgba(26,126,200,0.22)'; e.currentTarget.style.boxShadow = '0 2px 8px rgba(0,0,0,0.06)'; }}
            >Prenota Appuntamento</button>
          </div>

          {/* Stats */}
          <div style={{ display: 'flex', gap: 40 }}>
            {[{ v: '25+', l: 'Anni di esperienza' }, { v: '10k+', l: 'Clienti soddisfatti' }, { v: '15+', l: 'Servizi offerti' }].map((s, i) => (
              <div key={i}>

              </div>
            ))}

        </div>

        {/* RIGHT — big white circle + stethoscope + floating badges */}
        {!isTablet && <div style={{ position: 'relative', display: 'flex', justifyContent: 'center', alignItems: 'center', minHeight: 420 }}>
          {/* Large white circle */}

            width: 380, height: 380, borderRadius: '50%',

            position: 'relative',
          }}>

          </div>

          {/* Badge: Holter ECG — top */}
          <div style={{
            position: 'absolute', top: 28, left: '50%', transform: 'translateX(-10px)',
            background: '#fff', borderRadius: 12, padding: '10px 16px',

// ── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const result = useTweaks(TWEAK_DEFAULTS);
  const tweaks = (result && result.tweaks) ? result.tweaks : TWEAK_DEFAULTS;
  const blue = tweaks.blue;
  const darkBg = tweaks.darkBg;

  const [page, setPage] = useState('home');
  const menuVoci = useMenu();

  const renderPage = () => {
    switch (page) {
      case 'home': return (
        <>
          <Hero setPage={setPage} blue={blue} />
          <Tradition blue={blue} />
          <CorsettiLuxury darkBg={darkBg} blue={blue} />
          <ContactSection blue={blue} />
        </>
      );
      case 'telemedicina': return <TelemedPage blue={blue} />;
      case 'prodotti': return <ProdottiPage blue={blue} darkBg={darkBg} />;
      case 'laboratorio': return <LaboratorioPage blue={blue} />;
      case 'eventi': window.location.href = '/eventi.php'; return null;
      case 'test': window.location.href = '/test'; return null;
      case 'contatti': return (
        <div style={{ paddingTop: 20 }}>
          <ContactSection blue={blue} />
        </div>
      );
      default: return (
        <div style={{ maxWidth: 800, margin: '0 auto', padding: '80px 28px', textAlign: 'center' }}>
          <div style={{ fontSize: 48, marginBottom: 24 }}>🚧</div>
          <h1 style={{ fontSize: 28, fontWeight: 400, color: '#1a2332', marginBottom: 16 }}>Pagina in costruzione</h1>
          <p style={{ color: '#6a8090', fontSize: 16 }}>Questa sezione sarà disponibile a breve.</p>
        </div>
      );
    }
  };

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
      <Header page={page} setPage={setPage} blue={blue} menuVoci={menuVoci} />
      <main style={{ flex: 1 }}>{renderPage()}</main>
      <Footer blue={blue} setPage={setPage} />

      <TweaksPanel defaults={TWEAK_DEFAULTS}>
        <TweakSection title="Colori">
          <TweakColor id="blue" label="Azzurro principale" />
          <TweakColor id="darkBg" label="Sfondo sezione dark" />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}
